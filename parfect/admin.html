<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Admin Login</title>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Back to Home -->
    <div class="mb-4 w-full max-w-sm">
        <a href="index.html" class="text-gray-600 hover:text-red-600 flex items-center font-bold">
            <i class="fa fa-arrow-left mr-2"></i> হোম পেজে ফিরে যান
        </a>
    </div>

    <!-- Login Box -->
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-sm">
        <h2 class="text-center text-2xl font-bold text-gray-800 mb-6">Admin Login</h2>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-600 mb-1 text-sm">Username</label>
                <input type="text" id="username" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
            </div>
            
            <div>
                <label class="block text-gray-600 mb-1 text-sm">Password</label>
                <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" required>
            </div>
            
            <button type="submit" class="w-full p-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition">Login</button>
        </form>
        <p id="message" class="text-center mt-4 text-sm font-bold"></p>

        <!-- Forgot Password Link -->
<div style="text-align: center; margin-top: 10px;">
    <a href="#" onclick="forgotPassword()" style="color: #d32f2f; font-size: 13px; text-decoration: underline;">
        পাসওয়ার্ড ভুলে গেছেন?
    </a>
</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if (user === "admin" && pass === "1234") {
                msg.style.color = "green";
                msg.textContent = "Login Successful! Redirecting...";
            } else {
                msg.style.color = "red";
                msg.textContent = "Invalid username or password!";
            }
        });

        function forgotPassword() {
    const email = prompt("আপনার রেজিস্টার্ড ইমেইলটি লিখুন:");
    
    if (email) {
        firebase.auth().sendPasswordResetEmail(email)
            .then(() => {
                alert("পাসওয়ার্ড রিসেট করার লিঙ্ক আপনার ইমেইলে পাঠানো হয়েছে। আপনার ইনবক্স চেক করুন।");
            })
            .catch((error) => {
                alert("ত্রুটি: " + error.message);
            });
    }
}
    </script>
</body>
</html>
